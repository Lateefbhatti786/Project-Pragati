    <script src="js/script.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var lightbox = document.getElementById('galleryLightbox');
            var lightboxBackdrop = document.getElementById('galleryLightboxBackdrop');
            var lightboxImage = document.getElementById('galleryLightboxImage');
            var lightboxCaption = document.getElementById('galleryLightboxCaption');
            var closeButton = document.getElementById('galleryLightboxClose');
            var galleryImages = document.querySelectorAll('.gallery-item img');

            function openLightbox(image) {
                lightboxImage.src = image.src;
                lightboxImage.alt = image.alt || 'Gallery image';
                var figcaption = image.closest('.gallery-item')?.querySelector('figcaption');
                if (figcaption) {
                    var title = figcaption.querySelector('.gallery-caption-title')?.innerHTML || '';
                    var date = figcaption.querySelector('.gallery-caption-date')?.innerHTML || '';
                    var description = Array.from(figcaption.childNodes)
                        .filter(function (node) {
                            return node.nodeType === Node.TEXT_NODE && node.textContent.trim() ||
                                node.nodeType === Node.ELEMENT_NODE && !node.classList.contains('gallery-caption-title') && !node.classList.contains('gallery-caption-date');
                        })
                        .map(function (node) {
                            return node.textContent.trim();
                        })
                        .join(' ')
                        .trim();

                    lightboxCaption.innerHTML =
                        '<span class="gallery-lightbox-caption-title">' + title + '</span>' +
                        (date ? '<span class="gallery-lightbox-caption-date">' + date + '</span>' : '') +
                        (description ? '<p class="gallery-lightbox-caption-description">' + description + '</p>' : '');
                } else {
                    lightboxCaption.textContent = '';
                }
                lightbox.classList.add('visible');
                document.body.style.overflow = 'hidden';
                lightbox.setAttribute('aria-hidden', 'false');
            }

            function closeLightbox() {
                lightbox.classList.remove('visible');
                document.body.style.overflow = '';
                lightbox.setAttribute('aria-hidden', 'true');
            }

            galleryImages.forEach(function (img) {
                img.addEventListener('click', function () {
                    openLightbox(img);
                });
            });

            closeButton.addEventListener('click', closeLightbox);
            lightboxBackdrop.addEventListener('click', closeLightbox);

            document.addEventListener('keydown', function (event) {
                if (event.key === 'Escape' && lightbox.classList.contains('visible')) {
                    closeLightbox();
                }
            });
        });
    </script>
